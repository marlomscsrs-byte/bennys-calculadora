<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benny's Motorworks - Calculadora</title>
    <!-- Importação de fontes para recriar o logo idêntico ao da imagem -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Rubik+Mono+One&family=Share+Tech+Mono&family=Teko:wght@600&family=Montserrat:ital,wght@1,300&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #141414;
            --primary-color: #d90429; /* Vermelho Tuning */
            --primary-hover: #ef233c;
            --text-color: #ffffff;
            --text-secondary: #8d99ae;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), inset 0 0 15px rgba(217, 4, 41, 0.1);
            width: 100%;
            max-width: 400px;
            border: 2px solid var(--primary-color);
            position: relative;
            overflow: hidden;
        }

        /* LOGO ESTILIZADO DA IMAGEM */
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            user-select: none;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .logo-bennys {
            font-family: 'Teko', sans-serif;
            font-size: 56px;
            line-height: 0.8;
            text-transform: uppercase;
            color: #e2e2e2;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #111;
            transform: scaleY(1.1);
            margin: 0;
            display: inline-block;
        }

        .logo-original {
            font-family: 'Alex Brush', cursive;
            font-size: 38px;
            color: #d0d0d0;
            line-height: 0.5;
            margin: 5px 0 10px 0;
            display: block;
        }

        .logo-motorworks {
            font-family: 'Rubik Mono One', monospace;
            font-size: 13px;
            color: #b0b0b0;
            letter-spacing: 3px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-motorworks::before, .logo-motorworks::after {
            content: "◆";
            color: var(--primary-color);
            font-size: 10px;
        }

        .logo-speedshop {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-style: italic;
            font-size: 12px;
            letter-spacing: 6px;
            color: #707070;
            text-transform: uppercase;
            margin-top: 10px;
            display: block;
        }

        /* FORMULÁRIO */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 12px 12px 35px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #080808;
            color: #fff;
            font-size: 20px;
            font-family: 'Share Tech Mono', monospace;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(217, 4, 41, 0.3);
        }

        /* CHECKBOX POLICIAL */
        .options-group {
            background-color: #0e0e0e;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #222;
        }

        .options-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .options-group label {
            margin: 0;
            cursor: pointer;
            color: #d0d0d0;
            user-select: none;
            font-size: 13px;
        }

        /* RESULTADOS */
        .results {
            background-color: #0a0a0a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid var(--primary-color);
            border-right: 1px solid #222;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .result-row.total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #333;
            font-size: 22px;
            font-weight: bold;
            color: #52b788; /* Verde para destacar o preço de venda */
        }

        .result-row span:last-child {
            font-family: 'Share Tech Mono', monospace;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <!-- Logotipo Benny's Recriado conforme a Imagem -->
    <div class="logo-container">
        <div class="logo-bennys">Benny's</div>
        <div class="logo-original">Original</div>
        <div class="logo-motorworks">Motorworks</div>
        <div class="logo-speedshop">Speed Shop</div>
    </div>
    
    <div class="input-group">
        <label for="baseValue">Valor de Custo (Peças):</label>
        <div class="input-wrapper">
            <span class="currency-symbol">$</span>
            <input type="number" id="baseValue" placeholder="0,00" min="0" oninput="calcularValores()">
        </div>
    </div>

    <!-- Opção de Cobrança Policial -->
    <div class="options-group">
        <input type="checkbox" id="isPolice" onchange="calcularValores()">
        <label for="isPolice">Cliente é Policial? (Margem de 25%)</label>
    </div>

    <div class="results">
        <div class="result-row">
            <span>Custo das Peças:</span>
            <span id="txtCusto">$ 0,00</span>
        </div>
        <div class="result-row">
            <span>Mão de Obra (<span id="txtMargem">30</span>%):</span>
            <span id="txtAcrescimo">$ 0,00</span>
        </div>
        <div class="result-row total">
            <span>Cobrar do Cliente:</span>
            <span id="txtTotal">$ 0,00</span>
        </div>
    </div>

    <!-- Assinatura personalizada no rodapé -->
    <div class="footer">
        Est. 2026 • Criado por Brito
    </div>
</div>

<script>
    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'USD' })
            .replace('US$', '$'); 
    }

    function calcularValores() {
        const input = document.getElementById('baseValue');
        const isPoliceCheckbox = document.getElementById('isPolice');
        const valorBase = parseFloat(input.value) || 0;

        // Se for policial, a margem cai para 25% (0.25), senão permanece 30% (0.30)
        const taxa = isPoliceCheckbox.checked ? 0.25 : 0.30; 
        
        const valorAcrescimo = valorBase * taxa;
        const valorTotal = valorBase + valorAcrescimo;

        // Atualiza o texto da porcentagem exibida na interface
        document.getElementById('txtMargem').innerText = (taxa * 100).toFixed(0);
        
        document.getElementById('txtCusto').innerText = formatarMoeda(valorBase);
        document.getElementById('txtAcrescimo').innerText = formatarMoeda(valorAcrescimo);
        document.getElementById('txtTotal').innerText = formatarMoeda(valorTotal);
    }
</script>

</body>
</html>
