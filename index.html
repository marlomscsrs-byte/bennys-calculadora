<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benny's Motorworks - Calculadora & Materiais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Rubik+Mono+One&family=Share+Tech+Mono&family=Teko:wght@600&family=Montserrat:ital,wght=1,300&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #141414;
            --primary-color: #d90429; /* Vermelho Tuning */
            --primary-hover: #ef233c;
            --accent-green: #52b788;  /* Verde de Meta Batida */
            --accent-green-hover: #74c69d;
            --text-color: #ffffff;
            --text-secondary: #8d99ae;
            --accent-blue: #1e90ff;
            --accent-orange: #f39c12;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .calculator-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), inset 0 0 15px rgba(217, 4, 41, 0.1);
            width: 100%;
            max-width: 440px;
            border: 2px solid var(--primary-color);
            position: relative;
            overflow: hidden;
            transition: border-color 0.5s ease;
        }

        /* Se o ID ativo bateu a meta, a borda do painel fica verde brilhante */
        .calculator-card.meta-concluida-border {
            border-color: var(--accent-green) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), inset 0 0 15px rgba(82, 183, 136, 0.15);
        }

        /* LOGO ESTILIZADO */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            user-select: none;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .logo-bennys {
            font-family: 'Teko', sans-serif;
            font-size: 56px;
            line-height: 0.8;
            text-transform: uppercase;
            color: #e2e2e2;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #111;
            transform: scaleY(1.1);
            margin: 0;
            display: inline-block;
        }

        .logo-original {
            font-family: 'Alex Brush', cursive;
            font-size: 38px;
            color: #d0d0d0;
            line-height: 0.5;
            margin: 5px 0 10px 0;
            display: block;
        }

        .logo-motorworks {
            font-family: 'Rubik Mono One', monospace;
            font-size: 13px;
            color: #b0b0b0;
            letter-spacing: 3px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-motorworks::before, .logo-motorworks::after {
            content: "◆";
            color: var(--primary-color);
            font-size: 10px;
        }

        .logo-speedshop {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-style: italic;
            font-size: 12px;
            letter-spacing: 6px;
            color: #707070;
            text-transform: uppercase;
            margin-top: 10px;
            display: block;
        }

        /* SISTEMA DE ABAS */
        .tabs-nav {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            background: #0f0f0f;
            border: 1px solid #333;
            color: var(--text-secondary);
            padding: 10px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(217, 4, 41, 0.4);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* FORMULÁRIO E ENTRADAS */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group.row-flex {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .input-group.materials {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #080808;
            color: #fff;
            font-size: 16px;
            font-family: 'Share Tech Mono', monospace;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input[type="number"] {
            padding-left: 30px;
            font-size: 18px;
        }

        /* Campos de Identificação */
        .id-input {
            border-bottom: 2px solid var(--primary-color) !important;
        }
        .name-input {
            border-bottom: 2px solid #5865F2 !important;
        }

        /* Input específico para os materiais */
        .mat-input-aluminio {
            border-bottom: 2px solid var(--accent-blue) !important;
        }
        .mat-input-cobre {
            border-bottom: 2px solid var(--accent-orange) !important;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(217, 4, 41, 0.3);
        }

        .options-group {
            background-color: #0e0e0e;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #222;
        }

        .options-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .options-group label {
            margin: 0;
            cursor: pointer;
            color: #d0d0d0;
            user-select: none;
            font-size: 13px;
        }

        /* RESULTADOS */
        .results {
            background-color: #0a0a0a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid var(--primary-color);
            border-right: 1px solid #222;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .result-row.total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #333;
            font-size: 22px;
            font-weight: bold;
            color: var(--accent-green);
        }

        /* BOTÕES DE AÇÃO */
        .btn-action {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .btn-register-materials {
            background-color: #1c2541;
            color: #48cae4;
            border: 1px solid #0077b6;
        }
        .btn-register-materials:hover {
            background-color: #48cae4;
            color: #121212;
            box-shadow: 0 0 12px rgba(72, 202, 228, 0.4);
        }

        /* PAINEL HISTÓRICO DE MATERIAIS */
        .materials-box {
            background-color: #0d0d0d;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        .materials-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        /* BARRA DE PROGRESSO DA META INDIVIDUAL */
        .meta-container {
            margin-bottom: 15px;
        }
        .progress-container {
            background: #080808;
            border-radius: 6px;
            height: 18px;
            overflow: hidden;
            border: 1px solid #222;
            margin-top: 8px;
            position: relative;
        }
